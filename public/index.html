<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>QuantLog - 量化金融学习日志</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#78706a",
                        "primary-fixed-dim": "#f0a878",
                        "primary-container": "#e08850",
                        "surface-container-highest": "#e6e0d6",
                        "secondary-fixed": "#eae2da",
                        "on-secondary-container": "#605850",
                        "on-secondary": "#ffffff",
                        "on-background": "#3a302a",
                        "on-secondary-fixed-variant": "#504840",
                        "tertiary": "#8c3c3c",
                        "background": "#faf5ee",
                        "tertiary-container": "#d47070",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#401a08",
                        "primary-fixed": "#fbe8d8",
                        "secondary-fixed-dim": "#cec6be",
                        "inverse-primary": "#f0a878",
                        "on-primary-container": "#fbe8d8",
                        "error": "#c0392b",
                        "secondary-container": "#eae2da",
                        "on-error-container": "#7a1a10",
                        "surface-variant": "#ece6dc",
                        "inverse-surface": "#3a302a",
                        "tertiary-fixed-dim": "#e8a0a0",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#605850",
                        "on-secondary-fixed": "#2a2420",
                        "primary": "#c2652a",
                        "surface-bright": "#faf5ee",
                        "on-tertiary-fixed": "#2e1515",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#8a4518",
                        "surface-container-low": "#f6f0e8",
                        "outline": "#9a9088",
                        "surface": "#faf5ee",
                        "surface-container": "#f2ece4",
                        "outline-variant": "#d8d0c8",
                        "on-tertiary-fixed-variant": "#6e3030",
                        "inverse-on-surface": "#faf5ee",
                        "surface-dim": "#dcd6cc",
                        "on-surface": "#3a302a",
                        "surface-container-high": "#ece6dc",
                        "surface-tint": "#c2652a",
                        "on-tertiary-container": "#3a2020",
                        "error-container": "#fce4e0",
                        "tertiary-fixed": "#fce0e0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.8rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["EB Garamond", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .font-serif { font-family: 'EB Garamond', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .code-block {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body class="bg-background text-on-background selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
    <!-- TopAppBar -->
    <header class="sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4 max-w-6xl mx-auto bg-[#faf5ee] dark:bg-stone-950 border-b border-[#d8d0c8]/60 dark:border-stone-800 shadow-[0_2px_16px_rgba(58,48,42,0.04)]">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-serif italic text-[#c2652a] dark:text-orange-300">QuantLog</h1>
            <nav class="hidden md:flex gap-6 items-center">
                <a class="text-[#c2652a] dark:text-orange-400 border-b-2 border-[#c2652a] pb-1 font-medium" href="#">动态</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative hidden sm:block">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">search</span>
                <input class="pl-10 pr-4 py-1.5 bg-surface-container-low border-none rounded-full text-sm focus:ring-1 focus:ring-primary w-48" placeholder="搜索动态..." type="text"/>
            </div>
            <button class="material-symbols-outlined text-stone-500 hover:text-primary transition-colors active:scale-95">account_circle</button>
        </div>
    </header>
    <div class="max-w-6xl mx-auto flex">
        <!-- SideNavBar -->
        <aside class="hidden md:flex flex-col gap-2 p-6 h-[calc(100vh-73px)] sticky top-[73px] w-64 border-r border-[#d8d0c8]/60 dark:border-stone-800 bg-[#faf5ee] dark:bg-stone-950">
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant">
                        <img alt="头像" data-alt="close-up portrait of a professional young man with a friendly expression in soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGPZVs4zCDGUaWeYtVvdkfXMXpfcBOBI9hNKy3_mD3vTC1NwWNnlpdpGcJVNMKYLdcRZGkNna-ax1oz6_HLfThCOjeV-8Da44w3E8wffmYXEpwsJau59G-a7oSPahzWq3LXyVDSrkB281Ta-lLuc0V-B9jtM8UTNMJgH7AvBpKgXc6sZqFZI3y-VPstg_3tDGa-wVzjmgCKOo02IkebEKJnDJ1sjBAhuj9I2N0cKVuH4yLazQsBjIkEvW7Rn-FWj1-Ot077MzARlui"/>
                    </div>
                    <div>
                        <p class="font-serif text-lg leading-tight text-[#c2652a]">韭菜馅豆皮</p>
武汉大学2025级金融学生
                    </div>
                </div>
            </div>
            <nav class="space-y-1">
                <a class="flex items-center gap-3 px-4 py-3 bg-[#c2652a]/10 text-[#c2652a] rounded-lg font-bold" href="#">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dynamic_feed</span>
                    <span class="font-sans">动态</span>
                </a>
            </nav>
        </aside>
        <!-- Main Canvas -->
        <main class="flex-1 min-w-0 p-6 md:p-10">
            <div class="max-w-3xl mx-auto space-y-12">
                <!-- Introduction Header -->
                <section class="mb-16">
                    <h2 class="text-4xl md:text-5xl font-serif text-on-background mb-4 leading-tight">量化见解与市场实验</h2>
                    <p class="text-lg text-secondary font-body max-w-2xl leading-relaxed">
                        这里记录了我的学习历程与心得体会。
                    </p>
                </section>
                <!-- Feed Section -->
                <section id="feed" class="space-y-8">
                    <div class="text-center py-12 text-secondary">
                        <span class="material-symbols-outlined text-4xl mb-4 text-outline-variant">article</span>
                        <p>加载中...</p>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <!-- Bottom Navigation for Mobile -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#faf5ee] border-t border-[#d8d0c8]/60 px-8 py-3 flex justify-around items-center z-50">
        <button class="flex flex-col items-center gap-1 text-[#c2652a]">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dynamic_feed</span>
            <span class="text-[10px] font-medium">动态</span>
        </button>
    </nav>
    <script>
        const API_URL = window.location.origin + '/api';

        // 加载动态
        async function loadPosts() {
            try {
                const response = await fetch(`${API_URL}/posts`);
                const posts = await response.json();
                renderPosts(posts);
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('feed').innerHTML = `
                    <div class="text-center py-12 text-secondary">
                        <span class="material-symbols-outlined text-4xl mb-4 text-error">error</span>
                        <p>加载失败，请刷新重试</p>
                    </div>
                `;
            }
        }

        // 渲染动态
        function renderPosts(posts) {
            const feed = document.getElementById('feed');

            if (!posts || posts.length === 0) {
                feed.innerHTML = `
                    <div class="text-center py-12 text-secondary">
                        <span class="material-symbols-outlined text-4xl mb-4 text-outline-variant">article</span>
                        <p>暂无发布的内容</p>
                    </div>
                `;
                return;
            }

            feed.innerHTML = posts.map(post => `
                <article class="bg-surface-container-lowest rounded-xl p-6 md:p-8 shadow-[0_2px_16px_rgba(58,48,42,0.04)] border border-outline-variant/50">
                    <div class="space-y-4">
                        <h3 class="text-xl md:text-2xl font-serif text-on-background">${escapeHtml(post.title)}</h3>
                        <p class="text-sm text-secondary">${formatDate(post.created_at)}</p>
                        <div class="text-on-surface leading-relaxed whitespace-pre-wrap">${escapeHtml(post.content)}</div>
                        ${post.code ? `
                            <div class="mt-4">
                                <div class="flex items-center gap-2 text-xs text-secondary mb-2">
                                    <span class="material-symbols-outlined text-sm">code</span>
                                    <span>${escapeHtml(post.code_type || 'Python')}</span>
                                </div>
                                <pre class="bg-surface-container-highest rounded-lg p-4 overflow-x-auto code-block text-sm text-on-surface"><code>${escapeHtml(post.code)}</code></pre>
                            </div>
                        ` : ''}
                        ${post.files && post.files.length > 0 ? `
                            <div class="mt-4 space-y-2">
                                <div class="flex items-center gap-2 text-xs text-secondary">
                                    <span class="material-symbols-outlined text-sm">attach_file</span>
                                    <span>附件 (${post.files.length})</span>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    ${post.files.map(f => {
                                        const isImage = f.type === 'image' || (f.name && /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(f.name));
                                        if (isImage) {
                                            return `<a href="${f.url}" target="_blank" class="block"><img src="${f.url}" alt="${escapeHtml(f.name)}" class="h-24 rounded-lg object-cover border border-outline-variant/50 hover:opacity-80 transition-opacity"/></a>`;
                                        }
                                        return `<a href="${f.url}" target="_blank" class="flex items-center gap-2 bg-surface-container-low rounded-lg px-3 py-2 border border-outline-variant/50 hover:border-primary/50 transition-colors text-sm text-on-surface-variant hover:text-primary">
                                            <span class="material-symbols-outlined text-sm">description</span>
                                            <span class="truncate max-w-[150px]">${escapeHtml(f.name)}</span>
                                        </a>`;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </article>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 页面加载时获取数据
        loadPosts();
    </script>
</body>
</html>
